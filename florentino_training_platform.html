<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florentino Academy</title>
<style>
:root{
  --navy:#1F3A5F; --gold:#9C6B2E; --gold-l:#C79A5B; --cream:#F7F2E9;
  --green:#3E7C53; --red:#B5443A; --white:#fff; --ink:#2a2a2a;
  --radius:14px; --shadow:0 6px 24px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,'Times New Roman',serif;background:var(--cream);color:var(--navy);min-height:100vh;line-height:1.55}
.screen{display:none;min-height:100vh;padding:28px 18px}
.screen.active{display:flex;flex-direction:column;align-items:center}
.wrap{width:100%;max-width:880px}

/* LANDING */
#screen-landing{background:linear-gradient(160deg,#1F3A5F,#16293f);justify-content:center}
.logo-wrap{text-align:center;margin-bottom:38px}
.logo-wrap h1{color:var(--gold-l);font-size:2.6rem;letter-spacing:5px;text-transform:uppercase;font-weight:normal}
.logo-wrap .sub{color:rgba(255,255,255,.55);font-size:.8rem;letter-spacing:4px;margin-top:10px;text-transform:uppercase}
.card-dark{background:rgba(255,255,255,.06);border:1px solid var(--gold);border-radius:var(--radius);padding:38px 32px;width:100%;max-width:430px}
.card-dark h2{color:var(--gold-l);font-size:1.25rem;margin-bottom:22px;text-align:center;font-weight:normal}
.fg{margin-bottom:22px}
.fg label{display:block;color:rgba(255,255,255,.7);font-size:.78rem;letter-spacing:1.5px;margin-bottom:9px;text-transform:uppercase}
.fg input{width:100%;padding:13px 16px;border:1px solid var(--gold);background:rgba(255,255,255,.08);color:var(--white);border-radius:9px;font-size:1.05rem;font-family:inherit;outline:none}
.fg input::placeholder{color:rgba(255,255,255,.35)}
.fg input:focus{border-color:var(--gold-l);background:rgba(255,255,255,.12)}

/* BUTTONS */
.btn{display:inline-block;padding:14px 28px;border:none;border-radius:9px;font-family:inherit;font-size:1rem;cursor:pointer;transition:all .18s;text-align:center;letter-spacing:.4px}
.btn-gold{background:var(--gold);color:var(--white)}
.btn-gold:hover{background:var(--gold-l)}
.btn-navy{background:var(--navy);color:var(--white)}
.btn-navy:hover{filter:brightness(1.25)}
.btn-green{background:var(--green);color:var(--white)}
.btn-green:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;color:var(--navy);border:1.5px solid var(--navy)}
.btn-outline:hover{background:var(--navy);color:var(--white)}
.btn-full{width:100%}
.btn-sm{padding:10px 18px;font-size:.9rem}

/* HEADER BAR */
.topbar{width:100%;max-width:880px;display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}
.crumb{cursor:pointer;color:var(--navy);font-size:.92rem;display:flex;align-items:center;gap:6px;background:none;border:none;font-family:inherit}
.crumb:hover{color:var(--gold)}
.who{font-size:.85rem;color:var(--gold);font-style:italic}

.page-title{color:var(--navy);font-size:2rem;letter-spacing:1px;text-align:center;font-weight:normal}
.page-sub{color:var(--gold);font-size:.95rem;text-align:center;margin-top:8px;letter-spacing:.5px}

/* VENUE / SECTION CARDS */
.choose-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px;width:100%;max-width:820px;margin-top:36px}
.choice-card{background:var(--white);border:1px solid rgba(31,58,95,.14);border-radius:var(--radius);padding:34px 24px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.choice-card:hover{transform:translateY(-4px);border-color:var(--gold)}
.choice-card .icon{font-size:3rem;margin-bottom:16px}
.choice-card h3{color:var(--navy);font-size:1.25rem;margin-bottom:8px;font-weight:normal}
.choice-card p{color:#777;font-size:.85rem;line-height:1.5}
.choice-card .tag{display:inline-block;margin-top:14px;font-size:.72rem;font-family:sans-serif;padding:4px 12px;border-radius:20px;letter-spacing:.5px}
.tag-done{background:var(--green);color:#fff}
.tag-todo{background:rgba(156,107,46,.15);color:var(--gold)}
.tag-soon{background:#ddd;color:#888}

/* READING / TRAINING PAGE */
.read{width:100%;max-width:760px;background:var(--white);border-radius:var(--radius);padding:36px 38px;box-shadow:var(--shadow)}
.read h2{font-size:1.7rem;color:var(--navy);font-weight:normal;margin-bottom:6px}
.read .lede{color:var(--gold);font-size:1rem;margin-bottom:26px;font-style:italic}
.read h3{font-size:1.18rem;color:var(--gold);margin:30px 0 12px;font-weight:normal;border-bottom:1px solid rgba(156,107,46,.25);padding-bottom:6px}
.read h4{font-size:1rem;color:var(--navy);margin:20px 0 8px}
.read p{margin-bottom:14px;color:var(--ink);font-size:.98rem}
.read ul{margin:0 0 16px 22px}
.read li{margin-bottom:8px;color:var(--ink);font-size:.96rem}
.read .callout{background:rgba(156,107,46,.08);border-left:4px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 18px;margin:18px 0;font-size:.95rem}
.read .rule{background:var(--navy);color:var(--cream);border-radius:10px;padding:18px 20px;margin:18px 0;font-size:1rem}
.read .rule strong{color:var(--gold-l)}
.read .danger{background:rgba(181,68,58,.08);border-left:4px solid var(--red);border-radius:0 8px 8px 0;padding:14px 18px;margin:18px 0;font-size:.95rem}
.read .phrase-list{list-style:none;margin-left:0}
.read .phrase-list li{background:var(--cream);border-radius:8px;padding:10px 14px;margin-bottom:8px;font-style:italic;border:1px solid rgba(31,58,95,.08)}
.read table{width:100%;border-collapse:collapse;margin:16px 0;font-size:.9rem}
.read th,.read td{border:1px solid rgba(31,58,95,.15);padding:9px 12px;text-align:left}
.read th{background:var(--navy);color:var(--cream);font-weight:normal}
.read tr:nth-child(even) td{background:rgba(31,58,95,.03)}
.read-actions{margin-top:32px;text-align:center}

/* GAME HUB */
.gh-head{width:100%;max-width:820px;text-align:center;margin-bottom:8px}
.gh-head h2{color:var(--navy);font-size:1.6rem;font-weight:normal}
.gh-head p{color:var(--gold);font-size:.9rem;margin-top:6px}
.progress-wrap{background:rgba(31,58,95,.1);border-radius:20px;height:8px;width:100%;max-width:360px;margin:14px auto 4px}
.progress-bar{height:100%;border-radius:20px;background:var(--gold);transition:width .5s}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:18px;width:100%;max-width:820px;margin-top:26px}
.module-card{background:var(--white);border:1px solid rgba(31,58,95,.14);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all .2s;position:relative;box-shadow:var(--shadow)}
.module-card:hover{transform:translateY(-3px);border-color:var(--gold)}
.module-card.completed{border-color:var(--green)}
.module-card .m-icon{font-size:2rem;margin-bottom:10px}
.module-card h3{font-size:1rem;color:var(--navy);margin-bottom:5px;font-weight:bold}
.module-card p{font-size:.8rem;color:#777;line-height:1.4}
.module-card .badge{position:absolute;top:12px;right:12px;font-size:.68rem;padding:3px 9px;border-radius:20px;font-family:sans-serif;font-weight:600}
.badge-done{background:var(--green);color:#fff}
.badge-play{background:var(--gold);color:#fff}
.module-card .score-line{margin-top:8px;font-size:.74rem;color:var(--green);font-family:sans-serif}

/* GAME SCREEN */
.game-header{width:100%;max-width:740px;display:flex;align-items:center;gap:14px;margin-bottom:24px}
.game-back{cursor:pointer;color:var(--navy);font-size:1.3rem;flex-shrink:0;background:none;border:none}
.game-title-wrap{flex:1}
.game-title-wrap h2{font-size:1.15rem;color:var(--navy);font-weight:bold}
.game-title-wrap .game-sub{font-size:.78rem;color:var(--gold)}
.game-meta{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.pill{background:var(--navy);color:#fff;border-radius:20px;padding:5px 13px;font-size:.78rem;font-family:sans-serif}
.pill.gold{background:var(--gold)}
.pill.green{background:var(--green)}
.pill.red{background:var(--red)}
.game-area{width:100%;max-width:740px;background:var(--white);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);flex:1}

/* MCQ */
.q-progress{font-size:.82rem;color:#999;margin-bottom:12px;font-family:sans-serif}
.question-text{font-size:1.12rem;color:var(--navy);margin-bottom:20px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px}
.option{padding:14px 18px;border:2px solid rgba(31,58,95,.18);border-radius:9px;cursor:pointer;transition:all .18s;font-size:.95rem;line-height:1.45}
.option:hover{border-color:var(--gold);background:rgba(156,107,46,.05)}
.option.correct{border-color:var(--green);background:rgba(62,124,83,.1);color:var(--green)}
.option.wrong{border-color:var(--red);background:rgba(181,68,58,.1);color:var(--red)}
.feedback{margin-top:16px;padding:12px 16px;border-radius:8px;font-size:.9rem;display:none}
.feedback.show{display:block}
.feedback.good{background:rgba(62,124,83,.1);color:var(--green);border:1px solid var(--green)}
.feedback.bad{background:rgba(181,68,58,.1);color:var(--red);border:1px solid var(--red)}

/* DRAG */
.drag-list{display:flex;flex-direction:column;gap:8px}
.drag-item{padding:14px 16px;border:2px solid rgba(31,58,95,.18);border-radius:8px;cursor:grab;background:#fff;font-size:.93rem;display:flex;align-items:center;gap:12px;user-select:none}
.drag-item .h{color:#ccc;font-size:1.2rem}
.drag-item.dragging{opacity:.4;border-color:var(--gold)}
.drag-item.over{border-color:var(--gold);background:rgba(156,107,46,.06)}
.drag-item.correct-pos{border-color:var(--green);background:rgba(62,124,83,.08)}
.drag-item.wrong-pos{border-color:var(--red);background:rgba(181,68,58,.08)}

/* TIMER */
.timer-wrap{height:6px;background:#eee;border-radius:3px;margin-bottom:20px;overflow:hidden}
.timer-bar{height:100%;border-radius:3px;background:var(--green);transition:width .1s linear,background .3s}
.timer-bar.urgent{background:var(--red)}
.streak{font-family:sans-serif;font-size:.85rem;color:var(--gold);margin-bottom:12px}

/* OBJECTION / SCENARIO */
.obj-phrase{font-size:1.02rem;font-style:italic;color:var(--navy);padding:14px;background:rgba(31,58,95,.06);border-radius:8px;margin-bottom:18px;line-height:1.5}
.scenario-box{background:rgba(31,58,95,.06);border-radius:8px;padding:15px;margin-bottom:16px}
.scenario-box p{font-style:italic;color:var(--navy);line-height:1.5}
.rating-badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:.7rem;font-family:sans-serif;font-weight:700;margin-left:6px}
.rating-PERFECT{background:#d4edda;color:#155724}.rating-GOOD{background:#d1ecf1;color:#0c5460}
.rating-WEAK{background:#fff3cd;color:#856404}.rating-NEVER{background:#f8d7da;color:#721c24}
.lives{display:flex;gap:5px;margin-bottom:14px;font-size:1.25rem}

/* REVENUE */
.rev-display{text-align:center;margin-bottom:20px}
.rev-amt{font-size:2.8rem;color:var(--gold);font-weight:bold}
.rev-lbl{font-size:.82rem;color:#999;font-family:sans-serif}
.decision-text{font-size:1rem;color:var(--navy);margin-bottom:16px;font-style:italic;padding:14px;background:rgba(31,58,95,.06);border-radius:8px;line-height:1.5}
.dopt{padding:14px 18px;border:2px solid rgba(31,58,95,.18);border-radius:8px;cursor:pointer;font-size:.92rem;line-height:1.45;transition:all .2s;margin-bottom:10px}
.dopt:hover{border-color:var(--gold);background:rgba(156,107,46,.05)}
.dopt.best{border-color:var(--green);background:rgba(62,124,83,.1)}
.dopt.good{border-color:var(--gold);background:rgba(156,107,46,.1)}
.dopt.miss{border-color:var(--red);background:rgba(181,68,58,.1)}

/* RESULT */
.result-card{text-align:center;padding:28px}
.result-score{font-size:3.6rem;color:var(--gold);font-weight:bold;line-height:1}
.result-label{color:#777;margin-top:8px}
.result-msg{font-size:1.08rem;color:var(--navy);margin:18px 0;line-height:1.5}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}

/* CERT */
#screen-cert{background:linear-gradient(160deg,#1F3A5F,#16293f);justify-content:center}
.cert{background:var(--cream);border:3px solid var(--gold);border-radius:var(--radius);padding:46px 36px;max-width:600px;width:100%;text-align:center;box-shadow:var(--shadow)}
.cert .cl{color:var(--gold);font-size:1.1rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:18px}
.cert .seal{font-size:3.6rem;margin-bottom:12px}
.cert .ct{font-size:1.9rem;color:var(--navy);margin-bottom:6px;font-weight:normal}
.cert .cs{color:var(--gold);font-size:.9rem;letter-spacing:1px;margin-bottom:26px}
.cert .cn{font-size:2.2rem;color:var(--navy);border-bottom:2px solid var(--gold);padding-bottom:8px;margin:18px auto;display:inline-block}
.cert .cv{font-size:.98rem;color:#555;margin-bottom:10px}
.cert .cd{font-size:.82rem;color:#999;margin-bottom:26px}

/* CONFETTI */
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:9999}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

@media(max-width:600px){
  .logo-wrap h1{font-size:2rem}.read{padding:26px 20px}.game-area{padding:20px 16px}
  .cert{padding:30px 20px}.cert .cn{font-size:1.7rem}
}
@media print{.screen:not(.active){display:none}.btn{display:none}}

/* PHASE CARDS (allergy reading) */
.phase-card{display:flex;align-items:center;gap:18px;background:var(--cream);border:1px solid rgba(31,58,95,.14);border-radius:var(--radius);padding:20px 22px;margin:16px 0;cursor:pointer;transition:all .18s}
.phase-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--shadow)}
.phase-card .phase-no{flex:none;width:46px;height:46px;border-radius:12px;background:var(--gold);color:#fff;font-size:1.5rem;display:grid;place-items:center;font-family:Georgia,serif}
.phase-card .phase-body{flex:1}
.phase-card .phase-body h3{font-size:1.12rem;color:var(--navy);font-weight:normal;margin-bottom:4px}
.phase-card .phase-body h3 .ok{font-size:.7rem;font-family:sans-serif;color:#fff;background:var(--green);padding:2px 9px;border-radius:20px;margin-left:8px;vertical-align:middle}
.phase-card .phase-body p{font-size:.86rem;color:#777;margin:0;line-height:1.45}
.phase-card .phase-go{flex:none;color:var(--gold);font-size:.9rem;font-family:sans-serif}
/* GUIDE (iframe) SCREEN */
#screen-guide{padding:0}
#screen-guide.active{align-items:stretch}
.guide-bar{display:flex;align-items:center;gap:14px;background:var(--navy);color:#fff;padding:12px 18px;position:sticky;top:0;z-index:5}
.guide-bar button{background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:inherit;font-size:.92rem;cursor:pointer}
.guide-bar button:hover{background:rgba(255,255,255,.22)}
.guide-bar .gt{font-size:.98rem;color:var(--gold-l);letter-spacing:.3px}
.guide-frame{flex:1;width:100%;border:none;background:#fff;min-height:calc(100vh - 52px)}
/* LIGHTSPEED SIM — order panel */
.sim-panel{background:var(--cream);border:1px solid rgba(31,58,95,.14);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-family:sans-serif}
.sim-panel .sp-h{font-size:.7rem;letter-spacing:1px;text-transform:uppercase;color:#999;margin-bottom:8px}
.sim-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:6px;font-size:.82rem}
.sim-row .lbl{color:#888;min-width:84px}
.sim-tag{background:var(--navy);color:#fff;border-radius:6px;padding:3px 10px;font-size:.78rem}
.sim-tag.allergy{background:var(--gold)}
.sim-tag.ana{background:var(--red)}
.sim-tag.dish{background:var(--green)}
.sim-empty{color:#bbb;font-style:italic}
.sim-context{background:rgba(31,58,95,.06);border-left:4px solid var(--navy);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:14px;font-size:.95rem;color:var(--navy)}
.sim-step{font-size:.82rem;color:#999;margin-bottom:8px;font-family:sans-serif}
/* STAFF SELECT (landing) */
.staff-select{width:100%;padding:13px 16px;border:1px solid var(--gold);background:rgba(255,255,255,.08);color:#fff;border-radius:9px;font-size:1.05rem;font-family:inherit;outline:none}
.staff-select:focus{border-color:var(--gold-l);background:rgba(255,255,255,.12)}
.staff-select option,.staff-select optgroup{color:#222;background:#fff}
.reg-venues{display:flex;flex-wrap:wrap;gap:8px}
.reg-venues .rv{flex:1;min-width:120px;display:flex;align-items:center;gap:7px;padding:10px 12px;border:1px solid var(--gold);background:rgba(255,255,255,.06);border-radius:9px;color:rgba(255,255,255,.85);font-size:.92rem;cursor:pointer}
.reg-venues .rv input{accent-color:var(--gold);width:16px;height:16px}
</style>
</head>
<body>

<form name="academy-completion" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="text" name="staff-name"><input type="text" name="venue">
  <input type="text" name="track"><input type="text" name="module">
  <input type="number" name="score"><input type="text" name="date">
</form>

<!-- LANDING -->
<div id="screen-landing" class="screen active">
  <div class="logo-wrap">
    <h1>Florentino</h1>
    <div class="sub">Academy</div>
  </div>
  <div class="card-dark">
    <h2>Welcome 👋</h2>
    <div class="fg">
      <label>Your name</label>
      <select id="staff-select" class="staff-select"><option value="">Loading staff…</option></select>
      <input type="text" id="name-input" placeholder="Type your full name" autocomplete="off" style="display:none;margin-top:10px">
      <div id="reg-venue" class="reg-venues" style="display:none;margin-top:10px">
        <label class="rv"><input type="checkbox" value="Dining Room"> Dining Room</label>
        <label class="rv"><input type="checkbox" value="Café"> Café</label>
        <label class="rv"><input type="checkbox" value="Cellar Bar"> Cellar Bar</label>
      </div>
      <input type="text" id="reg-role" placeholder="Your role (optional)" autocomplete="off" style="display:none;margin-top:10px">
    </div>
    <button class="btn btn-gold btn-full" onclick="startJourney()">Enter the Academy →</button>
    <p style="color:rgba(255,255,255,.4);font-size:.78rem;text-align:center;margin-top:16px">Your progress is saved on this device.</p>
  </div>
</div>

<!-- VENUE SELECT -->
<div id="screen-venue" class="screen">
  <div class="topbar">
    <button class="crumb" onclick="goScreen('screen-landing')">← Sign out</button>
    <span class="who" id="who-1"></span>
  </div>
  <p class="page-title">Choose your venue</p>
  <p class="page-sub">Where are you training today?</p>
  <div class="choose-grid" id="venue-grid"></div>
</div>

<!-- SECTION SELECT -->
<div id="screen-section" class="screen">
  <div class="topbar">
    <button class="crumb" onclick="goScreen('screen-venue')">← Venues</button>
    <span class="who" id="who-2"></span>
  </div>
  <p class="page-title" id="section-venue-name"></p>
  <p class="page-sub">Choose a training track</p>
  <div class="choose-grid" id="section-grid" style="max-width:620px"></div>
</div>

<!-- READING / TRAINING -->
<div id="screen-read" class="screen">
  <div class="topbar">
    <button class="crumb" id="read-back" >← Back</button>
    <span class="who" id="who-3"></span>
  </div>
  <div class="read" id="read-content"></div>
</div>

<!-- GUIDE (iframe) -->
<div id="screen-guide" class="screen">
  <div class="guide-bar">
    <button id="guide-back">← Back</button>
    <span class="gt" id="guide-title"></span>
  </div>
  <iframe id="guide-frame" class="guide-frame" title="Training guide"></iframe>
</div>

<!-- GAME HUB -->
<div id="screen-hub" class="screen">
  <div class="topbar">
    <button class="crumb" id="hub-back">← Back</button>
    <span class="who" id="who-4"></span>
  </div>
  <div class="gh-head">
    <h2 id="hub-title"></h2>
    <p id="hub-desc"></p>
    <div class="progress-wrap"><div class="progress-bar" id="hub-progress" style="width:0%"></div></div>
    <p id="hub-progress-text" style="font-size:.78rem;color:#999;margin-top:6px;font-family:sans-serif"></p>
  </div>
  <div class="module-grid" id="hub-modules"></div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <button class="game-back" onclick="exitGame()">←</button>
    <div class="game-title-wrap">
      <h2 id="game-title"></h2>
      <div class="game-sub" id="game-sub"></div>
    </div>
    <div class="game-meta" id="game-meta"></div>
  </div>
  <div class="game-area" id="game-area"></div>
</div>

  <p>An allergen we can't see can still send a guest to hospital. 1 in 50 Australian adults live with a food allergy, and a <strong>trace</strong> — a shared fryer, a wiped-not-washed knife, a garnish — can be enough.</p>

  <h3>Allergy vs Intolerance</h3>
  <table>

function setMeta(h){document.getElementById('game-meta').innerHTML=h;}

function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function launchGame(m){

function showResult(score,total,m,extra,isFinal){
  const pct=Math.round(score/total*100), pass=pct>=80;
  saveProgress(m,pct);
  const certEligible = (S.track==='allergy') ? (pass && allergyCoreComplete()) : (isFinal&&pass);
  setArea(`<div class="result-card">
    <div class="result-score">${pct}%</div>

    ${extra||''}
    <div class="result-actions">
      <button class="btn btn-outline" onclick="launchGame('${m}')">🔄 Retry</button>
      ${certEligible?`<button class="btn btn-gold" onclick="showCert()">🏆 Get Certificate</button>`
        :`<button class="btn btn-green" onclick="exitGame()">← Back to modules</button>`}
    </div></div>`);
  setMeta(`<span class="pill ${pass?'green':'red'}">${pct}%</span>`);
}
/* generic MCQ engine: questions=[{q,options:[correct,...wrong],explanation}] */
function runMCQ(m,questions,opts={}){
  let i=0,score=0; const qs=shuffle(questions).slice(0,opts.limit||questions.length);
  const isFinal=opts.isFinal;
  function render(){
    if(i>=qs.length){showResult(score,qs.length,m,'',isFinal);return;}
    const q=qs[i];
    const o=shuffle(q.options.map((t,idx)=>({t,c:idx===0})));
    setMeta(`<span class="pill">${i+1}/${qs.length}</span>`+(isFinal?`<span class="pill gold">${score} pts</span>`:''));
    setArea(`<div class="q-progress">Question ${i+1} of ${qs.length}${isFinal?' — need 80% to pass':''}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${o.map(x=>`<div class="option" data-c="${x.c}" onclick="window._pick(this)">${x.t}</div>`).join('')}</div>
      <div class="feedback" id="fb">${q.explanation||''}</div>`);
  }
  window._pick=function(el){
    if(el.classList.contains('correct')||el.classList.contains('wrong'))return;
    const c=el.dataset.c==='true';
    document.querySelectorAll('.option').forEach(x=>{if(x.dataset.c==='true')x.classList.add('correct');});
    if(!c)el.classList.add('wrong');else score++;
    const fb=document.getElementById('fb');
    if(fb.textContent.trim())fb.classList.add('show',c?'good':'bad');
    setTimeout(()=>{i++;render();},fb.textContent.trim()?1450:700);
  };
  render();
}

  /* ---------- REVENUE RUSH (DR) ---------- */
  revenue(){
    const D=[
      {c:"Table of 2 orders still water. Next table has Champagne. Your move?",o:[{t:"'May I suggest a glass of Louis Roederer to start? It's beautiful tonight.'",v:30,l:'best',tag:'+$30'},{t:"Bring water, mention the aperitif list is available.",v:15,l:'good',tag:'+$15'},{t:"Serve the water and move on.",v:0,l:'miss',tag:'+$0'}]},
      {c:"They're reading the entrée section. You approach.",o:[{t:"Highlight the oysters with mandarin granita, then the parfait as a contrast.",v:40,l:'best',tag:'+$40'},{t:"Ask if they have questions about the entrées.",v:10,l:'good',tag:'+$10'},{t:"Give them more time.",v:0,l:'miss',tag:'+$0'}]},
      {c:"Mains ordered — one Wagyu, one pasta. Wine?",o:[{t:"Pair confidently: Shiraz with the Wagyu, Nebbiolo with the pasta — by the glass.",v:70,l:'best',tag:'+$70'},{t:"Offer the wine list.",v:30,l:'good',tag:'+$30'},{t:"Bring water, let them ask.",v:0,l:'miss',tag:'+$0'}]},
      {c:"First glass nearly empty mid-meal.",o:[{t:"'Another glass, or a second wine for your remaining food?'",v:40,l:'best',tag:'+$40'},{t:"Wait until it's empty to ask.",v:10,l:'good',tag:'+$10'},{t:"Leave them — they'll ask.",v:0,l:'miss',tag:'+$0'}]},
      {c:"Mains cleared, 8:30pm, relaxed and engaged.",o:[{t:"Plant the soufflé: 'It takes 20 min — order now and it's perfectly timed. Or a cheese course?'",v:55,l:'best',tag:'+$55'},{t:"Offer the dessert menu.",v:20,l:'good',tag:'+$20'},{t:"Present the bill.",v:0,l:'miss',tag:'+$0'}]},
      {c:"Soufflé ordered. Closing the meal.",o:[{t:"'A digestif while it arrives — Amaro, Grappa, or a coffee to finish?'",v:35,l:'best',tag:'+$35'},{t:"Offer a coffee.",v:15,l:'good',tag:'+$15'},{t:"Bring the soufflé, wait for the bill.",v:0,l:'miss',tag:'+$0'}]}
    ];
    let total=140,i=0;const MAX=410,BENCH=350;
    function render(){
      if(i>=D.length){finish();return;}
      const d=D[i];
      setMeta(`<span class="pill gold">$${total}</span>`);
      setArea(`<div class="rev-display"><div class="rev-amt">$${total}</div><div class="rev-lbl">Table check so far</div></div>
        <div style="background:#eee;border-radius:4px;height:8px;margin-bottom:18px;overflow:hidden"><div style="width:${Math.min(100,total/MAX*100)}%;height:100%;background:var(--gold);border-radius:4px;transition:width .4s"></div></div>
        <div class="decision-text">${d.c}</div>
        ${d.o.map(o=>`<div class="dopt" data-v="${o.v}" data-l="${o.l}" data-tag="${o.tag}" onclick="window._pr(this)">${o.t}</div>`).join('')}`);
    }
    window._pr=function(el){
      if(el.classList.contains('best')||el.classList.contains('good')||el.classList.contains('miss'))return;
      el.classList.add(el.dataset.l);el.innerHTML+=` <strong style="color:var(--green)">${el.dataset.tag}</strong>`;
      document.querySelectorAll('.dopt').forEach(o=>{o.onclick=null;o.style.cursor='default';});
      total+=parseInt(el.dataset.v);setTimeout(()=>{i++;render();},1150);
    };
    function finish(){
      const pct=Math.round((total-140)/(MAX-140)*100),pass=total>=BENCH;
      saveProgress('revenue',pct);
      const msg=total>=MAX-20?'🏆 Exceptional — you maximised every opportunity.':total>=BENCH?'✅ Above the Florentino Standard.':total>=250?'📈 Getting there — a few missed moments.':'📚 Every missed moment costs revenue.';
      setArea(`<div class="result-card"><div class="result-score">$${total}</div><div class="result-label">Final table check</div>
        <div style="margin:14px 0;font-size:.9rem;color:#666">Florentino Standard: <strong style="color:var(--navy)">$${BENCH}+</strong> · Max possible: <strong style="color:var(--gold)">$${MAX}</strong></div>
        <div class="result-msg">${msg}</div>
        <div class="result-actions"><button class="btn btn-outline" onclick="launchGame('revenue')">🔄 Retry</button><button class="btn btn-green" onclick="exitGame()">← Back to modules</button></div></div>`);
      setMeta(`<span class="pill ${pass?'green':'red'}">$${total}</span>`);
    }
    render();
  },

  /* ============================================================
     ALLERGY GAMES
     ============================================================ */
  /* ---------- LIGHTSPEED ORDER SIM (Quiz 2 · common) ---------- */
  lightspeedsim(){
    const SC=[
      {ctx:"<b>Table 14 · 2 guests.</b> As you greet them, <b>Seat 1</b> tells you they have a <b>shellfish</b> allergy.",
       steps:[
        {p:"How do you tag the table NAME?",add:{type:'name',val:'SHELLFISH S1'},
         opts:["SHELLFISH S1","ANAPHYLACTIC","ALLERGY","Nothing — note it on the dish only"],
         fb:"1–2 allergies → allergy + seat on the name (SHELLFISH S1)."},
        {p:"You press the purple ALLERGY button. What goes on the ALLERGY line?",add:{type:'allergy',val:'Shellfish · Seat 1'},
         opts:["Shellfish, Seat 1","Shellfish (no seat)","ALLERGY for the whole table","Nothing — the name is enough"],
         fb:"Every allergy goes in with the seat it belongs to."},
        {p:"Seat 1 orders a pasta finished with a seafood bisque. Under that dish you add:",add:{type:'dish',val:'No shellfish – sub tomato · Seat 1'},
         opts:["No shellfish – sub tomato, Seat 1","Serve it, tell the kitchen verbally","Scrape the bisque off at the pass","Nothing — the ALLERGY line covers it"],
         fb:"Every affected dish needs a 'No ___ – sub ___' + seat via its MOD group."}
       ]},
      {ctx:"<b>Table 8 · 5 guests.</b> Seat 2 is <b>dairy</b>, Seat 3 is <b>gluten</b>, Seat 5 is <b>pine nut</b>.",
       steps:[
        {p:"Three allergies at one table — how do you tag the NAME?",add:{type:'name',val:'ALLERGY'},
         opts:["ALLERGY","DAIRY S2 / GLUTEN S3 / PINENUT S5","ANAPHYLACTIC","Nothing"],
         fb:"3+ allergies → just 'ALLERGY'; the detail goes on the ALLERGY line."},
        {p:"On the ALLERGY line you enter:",add:{type:'allergy',val:'Dairy S2 · Gluten S3 · Pine Nut S5'},
         opts:["Each allergy against its seat (Dairy S2, Gluten S3, Pine Nut S5)","Just 'ALLERGY'","Only the most dangerous one","All three on Seat 1"],
         fb:"Each allergy with its own seat, so the kitchen knows who is who."},
        {p:"The table orders 5 souffles; one must be no pine nut. You ring it as:",add:{type:'dish',val:'4x Souffle + 1x No Pine Nut · Seat 5'},
         opts:["4 × Souffle on one line + 1 × Souffle – No Pine Nut on its own line","5 × Souffle with a note 'one no nut'","5 × Souffle on one line","2 lines of mixed quantities"],
         fb:"Split the quantity — the allergy plate always stands on its own line."}
       ]},
      {ctx:"<b>Table 333.</b> Seat 1 says they are <b>anaphylactic</b> to peanut.",
       steps:[
        {p:"Your first two actions are:",add:{type:'ana',val:'Logged on Lightspeed + manager told'},
         opts:["Tag ANAPHYLACTIC, log it on Lightspeed & tell the manager — first","Take the whole order, then mention it to the kitchen","Offer water and carry on","Write it on a napkin for the chef"],
         fb:"Anaphylaxis: log on Lightspeed + tell the manager before anything else."},
        {p:"The table NAME should read:",add:{type:'name',val:'ANAPHYLACTIC'},
         opts:["ANAPHYLACTIC","PEANUT S1","ALLERGY","Leave the name unchanged"],
         fb:"Anaphylaxis always takes priority on the name tag."},
        {p:"A dish you need isn't listed in the Allergy Matrix. You:",add:{type:'dish',val:'Asked the chef (not in Matrix)'},
         opts:["Go and ask the chef — never guess","Assume it's safe","Assume it contains peanut","Serve it and watch the guest"],
         fb:"Matrix first → if it is not listed, ask the chef. Never guess."}
       ]}
    ];
    const flat=[]; SC.forEach((s,si)=>s.steps.forEach((st,sti)=>flat.push(Object.assign({si,first:sti===0,ctx:s.ctx},st))));
    const total=flat.length;
    let i=0,score=0; const built={name:'',ana:'',lines:[],dishes:[]};
    function panel(){
      return `<div class="sim-panel">
        <div class="sp-h">🧾 The order you're building</div>
        <div class="sim-row"><span class="lbl">Table name</span>${built.name?`<span class="sim-tag ${built.name==='ANAPHYLACTIC'?'ana':''}">${built.name}</span>`:'<span class="sim-empty">—</span>'}${built.ana?`<span class="sim-tag ana">${built.ana}</span>`:''}</div>
        <div class="sim-row"><span class="lbl">ALLERGY line</span>${built.lines.length?built.lines.map(l=>`<span class="sim-tag allergy">${l}</span>`).join(''):'<span class="sim-empty">—</span>'}</div>
        <div class="sim-row"><span class="lbl">Dishes</span>${built.dishes.length?built.dishes.map(d=>`<span class="sim-tag dish">${d}</span>`).join(''):'<span class="sim-empty">—</span>'}</div>
      </div>`;
    }
    function apply(add){
      if(add.type==='name')built.name=add.val;
      else if(add.type==='ana')built.ana=add.val;
      else if(add.type==='allergy')built.lines.push(add.val);
      else if(add.type==='dish')built.dishes.push(add.val);
    }
    function render(){
      if(i>=total){showResult(score,total,'lightspeedsim','<p style="color:#666;font-size:.9rem">A clean order keeps the guest safe and the kitchen confident.</p>',true);return;}
      const q=flat[i];
      if(q.first){built.name='';built.ana='';built.lines=[];built.dishes=[];}
      setMeta(`<span class="pill">${i+1}/${total}</span><span class="pill gold">${score} pts</span>`);
      setArea(panel()
        +(q.first?`<div class="sim-context">${q.ctx}</div>`:'')
        +`<div class="sim-step">Scenario ${q.si+1} of ${SC.length} — need 80% to be certified</div>
        <div class="question-text">${q.p}</div>
        <div class="options">${shuffle(q.opts.map((t,idx)=>({t,c:idx===0}))).map(x=>`<div class="option" data-c="${x.c}" onclick="window._ls(this)">${x.t}</div>`).join('')}</div>
        <div class="feedback" id="fb">${q.fb}</div>`);
    }
    window._ls=function(el){
      if(el.classList.contains('correct')||el.classList.contains('wrong'))return;
      const c=el.dataset.c==='true';
      document.querySelectorAll('.option').forEach(x=>{if(x.dataset.c==='true')x.classList.add('correct');});
      if(!c)el.classList.add('wrong');else score++;
      apply(flat[i].add);
      const fb=document.getElementById('fb');fb.classList.add('show',c?'good':'bad');
      setTimeout(()=>{i++;render();},1450);
    };
    render();
  },

function showCert(){
  const v=S.venue,t=S.track;
  const trackName=(t==='service'?'Service & Sales':'Allergy Training');
  document.getElementById('cert-track').textContent=trackName+' — '+VENUES[v].name;
  document.getElementById('cert-name').textContent=S.name||'Staff Member';

  document.getElementById('cert-date').textContent='Melbourne, '+new Date().toLocaleDateString('en-AU',{year:'numeric',month:'long',day:'numeric'});
  launchConfetti();goScreen('screen-cert');
}
function launchConfetti(){
  const cols=['#9C6B2E','#C79A5B','#1F3A5F','#3E7C53','#B5443A'];
  for(let i=0;i<80;i++){const e=document.createElement('div');e.className='confetti-piece';
    e.style.cssText=`left:${Math.random()*100}vw;background:${cols[i%cols.length]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.8}s`;
    document.body.appendChild(e);e.addEventListener('animationend',()=>e.remove());}
}

/* ---- TRACKING (Google Sheet via Apps Script) ---- */
function submitNetlify(m,score){ postCompletion(m,score); } // kept for compatibility
function postCompletion(m,score){
  if(!TRACKING_URL) return;
  const payload={
    staff:S.name||'Unknown',
    venue:S.venue,                 // dr / cafe / cb
    track:S.track,                 // service / allergy
    module:m,
    score:score
  };
  try{
    fetch(TRACKING_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
  }catch(e){}
}
function jsonp(url,ok,err){
  const cb='__cb'+Math.random().toString(36).slice(2);
  let s=document.createElement('script');
  const t=setTimeout(()=>{cleanup();err&&err();},9000);
  function cleanup(){clearTimeout(t);try{delete window[cb];}catch(e){}if(s&&s.parentNode)s.parentNode.removeChild(s);}
  window[cb]=(d)=>{cleanup();ok&&ok(d);};
  s.onerror=()=>{cleanup();err&&err();};
  s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
  document.body.appendChild(s);
}
function escH(x){return String(x).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function showNameFallback(){
  const sel=document.getElementById('staff-select'); if(sel)sel.style.display='none';
  const ni=document.getElementById('name-input'); if(ni){ni.style.display='block'; ni.value='';} // blank each time
  if(TRACKING_URL){ const rv=document.getElementById('reg-venue'); if(rv)rv.style.display='flex'; const rr=document.getElementById('reg-role'); if(rr)rr.style.display='block'; }
}
function loadRoster(){
  // Privacy: we never display other staff names — everyone types their own name.
  showNameFallback();
}

/* INIT */
document.addEventListener('DOMContentLoaded',()=>{
  loadRoster();
});
