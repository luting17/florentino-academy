<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florentino Academy</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,'Times New Roman',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:linear-gradient(160deg,#1F3A5F,#16293f);color:#fff;padding:24px}
  .wrap{text-align:center;max-width:520px;width:100%}
  h1{color:#C79A5B;font-size:2.4rem;letter-spacing:5px;text-transform:uppercase;font-weight:normal}
  .sub{color:rgba(255,255,255,.55);font-size:.78rem;letter-spacing:4px;margin:10px 0 40px;text-transform:uppercase}
  .cards{display:grid;gap:18px}
  a.card{display:block;text-decoration:none;background:rgba(255,255,255,.06);border:1px solid #9C6B2E;border-radius:14px;
         padding:28px 26px;transition:all .18s}
  a.card:hover{background:rgba(255,255,255,.12);transform:translateY(-3px)}
  a.card h2{color:#C79A5B;font-size:1.3rem;font-weight:normal;margin-bottom:6px}
  a.card p{color:rgba(255,255,255,.7);font-size:.9rem;line-height:1.5}
  .foot{margin-top:34px;color:rgba(255,255,255,.35);font-size:.78rem}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Florentino</h1>
    <div class="sub">Academy</div>
    <div class="cards">
      <a class="card" href="florentino_training_platform.html">
        <h2>Staff Training →</h2>
        <p>Service &amp; Sales and Allergy Training — by venue, with games and certification.</p>
      </a>
      <a class="card" href="dashboard.html">
        <h2>Manager Dashboard →</h2>
        <p>Who has completed what — scores, dates and certification. Passcode required.</p>
      </a>
    </div>
    <div class="foot">Florentino · Melbourne</div>
  </div>
</body>
</html>
